<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page View Transitions - Demo 01</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

    <div id="site-header"></div>

    <main>
        <div class="grid">
            <div class="card">
                <a href="single-01.html"><img src="assets/img/pexels-fotios-photos-1107717.jpg" alt="Image 1"
                style="view-transition-name: card-01;"></a>
                <h2 class="title" style="view-transition-name: title-01;"><a href="single-01.html">Card Title 1</a></h2>
                <p class="description">This is a description for card 1.</p>
            </div>
            <div class="card">
                <a href="single-02.html"><img src="assets/img/pexels-pixabay-206359.jpg" alt="Image 2"
                style="view-transition-name: card-02;"></a>
                <h2 class="title" style="view-transition-name: title-02;"><a href="single-02.html">Card Title 2</a></h2>
                <p class="description">This is a description for card 2.</p>
            </div>
            <div class="card">
                <a href="single-03.html"><img src="assets/img/pexels-souvenirpixels-1619317.jpg" alt="Image 3"
                style="view-transition-name: card-03;"></a>
                <h2 class="title" style="view-transition-name: title-03;"><a href="single-03.html">Card Title 3</a></h2>
                <p class="description">This is a description for card 3.</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="assets/app.js" defer></script>
</body>
</html>
