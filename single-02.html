<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page View Transitions - Card 02</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    
    <header>
        <a class="logo" href="index.html">Page View Transitions</a>
        <div class="header-actions">
            <span class="demo-badge" id="transition-label">Default crossfade</span>
            <label class="transition-control" for="transition-preset">
                <span>Preset</span>
                <select id="transition-preset" aria-label="Transition preset">
                    <option value="crossfade">Crossfade</option>
                    <option value="slide">Slide</option>
                    <option value="reveal">Reveal</option>
                    <option value="direction">Direction-aware</option>
                </select>
            </label>
            <a class="button" href="https://github.com/your-username/your-repo" target="_blank" rel="noopener noreferrer">GitHub Repo</a>
        </div>
    </header>

    <main>
        <div class="single">
            <img src="assets/img/pexels-pixabay-206359.jpg" alt="Single Image"
            style="view-transition-name: card-02;">
            <div class="single-text">
                <h2 class="title" style="view-transition-name: title-02;">Card Title 02</h2>
                <p class="description">This is a description for the single image.</p>
            </div>
        </div>
    </main>


    <footer>
        Page View Transitions API Demo &mdash; CSS &amp; HTML only
    </footer>

    <script src="assets/app.js" defer></script>
</body>
</html>
